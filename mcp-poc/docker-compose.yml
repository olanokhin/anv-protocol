services:
  mcp-server-warn:
    build: .
    command: python mcp_server.py --anv-policy=warn --port=8001
    ports:
      - "8001:8001"

  mcp-server-require:
    build: .
    command: python mcp_server.py --anv-policy=require --port=8002
    ports:
      - "8002:8002"

  agent-signed:
    build: .
    command: python agent.py --anv=true --server=http://mcp-server-warn:8001 --port=8003
    ports:
      - "8003:8003"
    depends_on:
      - mcp-server-warn

  agent-unsigned:
    build: .
    command: python agent.py --anv=false --server=http://mcp-server-require:8002 --port=8004
    ports:
      - "8004:8004"
    depends_on:
      - mcp-server-require
